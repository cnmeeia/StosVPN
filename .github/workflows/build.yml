name: Build and Fake-Sign IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # 使用 macos-14 或 macos-15 均可，但不要强行指定尚未配置好 SDK 的 Xcode
    runs-on: macos-15 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      # 建议移除手动 xcode-select，让系统使用默认稳定的版本
      # 或者使用 xcode-select -p 查看当前版本

      - name: Build Xcode Archive
        run: |
          # 关键：确保 pipe 中的任何命令失败都会导致步骤失败
          set -o pipefail
          set -e
          
          ARCHIVE_PATH="build/StosVPN.xcarchive"
          mkdir -p build
          
          # 执行构建
          # 添加了 AD_HOC_CODE_SIGNING_ALLOWED=YES (有时对某些项目有用)
          xcodebuild archive \
            -project StosVPN.xcodeproj \
            -scheme StosVPN \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ALLOW_PROVISIONING_DEVICE_REGISTRATION=NO \
            CLANG_ENABLE_MODULES=YES \
            | tee xcodebuild.log
          
          echo "Archive created at $ARCHIVE_PATH"

      - name: Locate .app inside archive
        id: locate_app
        run: |
          set -e
          ARCHIVE_PATH="build/StosVPN.xcarchive"
          APPS_DIR="$ARCHIVE_PATH/Products/Applications"
          
          if [ ! -d "$APPS_DIR" ]; then
            echo "错误: 归档文件未生成。请检查上一步 xcodebuild.log 的具体错误。"
            exit 1
          fi
          
          APP_PATH=$(find "$APPS_DIR" -maxdepth 1 -name "*.app" | head -n1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Create Payload directory and copy .app
        run: |
          set -e
          APP_PATH="${{ steps.locate_app.outputs.app_path }}"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

      - name: Find and Sign App Extension(s)
        run: |
          set -e
          APPEXS=$(find Payload -type d -path "*/PlugIns/*.appex" || true)
          if [ -n "$APPEXS" ]; then
            while IFS= read -r ap; do
              [ -z "$ap" ] && continue
              EXE=$(find "$ap" -maxdepth 1 -type f -perm +111 | head -n1)
              ENT="${GITHUB_WORKSPACE}/TunnelProv/TunnelProv.entitlements"
              if [ -f "$ENT" ]; then
                ldid -S"$ENT" "$EXE"
              else
                ldid "$EXE"
              fi
            done <<< "$APPEXS"
          fi

      - name: Sign Main App Binary
        run: |
          set -e
          APP_DIR=$(find Payload -maxdepth 1 -name "*.app" | head -n1)
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_DIR/Info.plist")
          APP_BIN="$APP_DIR/$EXEC_NAME"
          ENT_FILE="${GITHUB_WORKSPACE}/StosVPN/StosVPN.entitlements"
          
          if [ -f "$ENT_FILE" ]; then
            ldid -S"$ENT_FILE" "$APP_BIN"
          else
            ldid "$APP_BIN"
          fi

      - name: Create IPA
        run: |
          zip -r StosVPN-fakesigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StosVPN-IPA
          path: StosVPN-fakesigned.ipa
